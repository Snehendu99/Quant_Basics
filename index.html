<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sum Game</title>
<style>
*{box-sizing:border-box}
body{font-family:Arial;margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#121212;color:#fff}

.container{background:#1e1e1e;padding:20px;border-radius:16px;box-shadow:0 4px 15px rgba(0,0,0,.4);width:100%;max-width:420px;text-align:center}

select,input,button{width:100%;padding:12px;margin-bottom:10px;border-radius:8px;border:1px solid #333;font-size:16px;background:#222;color:#fff}
button{border:none;cursor:pointer;background:#2e7d32}
button:hover{background:#388e3c}

.numbers{margin:20px 0;height:160px;position:relative}
.num{position:absolute;font-size:22px;font-weight:bold}

.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.keypad button{background:#333}

.timer,#result{margin-top:10px;font-weight:bold}
</style>
</head>
<body>
<div class="container">
<h2>Sum the Numbers</h2>

<div id="controls">
<select id="timeSelect">
<option value="60">1 Min</option>
<option value="120">2 Min</option>
<option value="180">3 Min</option>
<option value="240">4 Min</option>
<option value="300">5 Min</option>
</select>

<input type="number" id="totalNumbers" placeholder="Total numbers (e.g. 10)" min="1" max="50">

<input type="number" id="minRange" placeholder="Min number (e.g. 1)">
<input type="number" id="maxRange" placeholder="Max number (e.g. 9)">

<button onclick="startGame()">Start</button>
</div>

<div class="numbers" id="numbers"></div>

<input type="text" id="answer" placeholder="Enter sum">

<div class="keypad" id="keypad"></div>

<div id="gameActions" style="display:none;">
<button onclick="restartGame()">Restart</button>
<button onclick="resumeGame()">Resume</button>
</div>

<div id="result"></div>
<div class="timer" id="timer"></div>
</div>

<script>
let numbers=[],correctSum=0,timeLeft=0,timerInterval,gameActive=false;
let correctCount=0,wrongCount=0;

answer.addEventListener("keydown",e=>{if(e.key==="Enter") checkAnswer();});
answer.addEventListener("input",e=>{e.target.value=e.target.value.replace(/[^0-9]/g,'');});

function getRandomColor(){
  const colors=["#ff5252","#ff9800","#ffeb3b","#4caf50","#00bcd4","#2196f3","#9c27b0","#e91e63","#00e676"];
  return colors[Math.floor(Math.random()*colors.length)];
}

function generateNumbers(){
  const container=document.getElementById("numbers");
  container.innerHTML="";
  numbers=[];correctSum=0;

  const placed=[];
  const MIN_DIST=28;

  function isFarEnough(x,y){
    return placed.every(p=>{
      const dx=p.x-x, dy=p.y-y;
      return Math.sqrt(dx*dx+dy*dy) > MIN_DIST;
    });
  }

  let total = parseInt(totalNumbers.value) || 10;
  let min = parseInt(minRange.value) || 1;
  let max = parseInt(maxRange.value) || 9;

  if(min > max){ [min, max] = [max, min]; }

  for(let i=0;i<total;i++){
    let num=Math.floor(Math.random()*(max-min+1))+min;
    numbers.push(num);
    correctSum+=num;

    let x,y,attempts=0;
    do{
      x=Math.random()*90+5;
      y=Math.random()*80+10;
      attempts++;
      if(attempts>300) break;
    }while(!isFarEnough(x,y));

    placed.push({x,y});

    let span=document.createElement("span");
    span.className="num";
    span.innerText=num;
    span.style.left=x+"%";
    span.style.top=y+"%";
    span.style.color=getRandomColor();

    container.appendChild(span);
  }
}

function createKeypad(){
  const pad=document.getElementById("keypad");
  pad.innerHTML="";

  // numbers 1-9
  const nums=[1,2,3,4,5,6,7,8,9];
  nums.forEach(n=>{
    let btn=document.createElement("button");
    btn.innerText=n;
    btn.onclick=()=>answer.value+=n;
    pad.appendChild(btn);
  });

  // BACKSPACE (left of 0)
  let backBtn=document.createElement("button");
  backBtn.innerText="⌫";
  backBtn.onclick=()=>{
    answer.value = answer.value.slice(0, -1);
  };
  pad.appendChild(backBtn);

  // 0 (center)
  let zeroBtn=document.createElement("button");
  zeroBtn.innerText="0";
  zeroBtn.onclick=()=>answer.value+="0";
  pad.appendChild(zeroBtn);

  // ENTER (right of 0)
  let enterBtn=document.createElement("button");
  enterBtn.innerText="Enter";
  enterBtn.onclick=()=>checkAnswer();
  pad.appendChild(enterBtn);

  // Clear full width
  let clearBtn=document.createElement("button");
  clearBtn.innerText="Clear";
  clearBtn.onclick=()=>answer.value="";
  clearBtn.style.gridColumn="1 / span 3";
  pad.appendChild(clearBtn);
}

function startGame(){
  document.getElementById("controls").style.display="none";
  generateNumbers();
  createKeypad();
  timeLeft=parseInt(timeSelect.value);
  correctCount=0;wrongCount=0;
  gameActive=true;
  result.innerText="";
  clearInterval(timerInterval);
  timerInterval=setInterval(updateTimer,1000);
}

function updateTimer(){
  if(timeLeft<=0){
    clearInterval(timerInterval);
    gameActive=false;

    document.getElementById("numbers").style.display="none";
    document.getElementById("keypad").style.display="none";
    document.getElementById("answer").style.display="none";

    // show action buttons
    document.getElementById("gameActions").style.display="block";

    result.innerText=`Correct: ${correctCount} | Incorrect: ${wrongCount}`;
    timer.innerText="Time's up!";
    return;
  }
  let m=Math.floor(timeLeft/60),s=timeLeft%60;
  timer.innerText=`Time: ${m}:${s<10?'0':''}${s}`;
  timeLeft--;
}

function checkAnswer(){
  if(!gameActive) return;
  if(!gameActive) return;
  let val=parseInt(answer.value);

  if(val===correctSum){
    correctCount++;
    result.innerText="Correct!";
    generateNumbers();
  }else{
    wrongCount++;
    result.innerText="Wrong!";
  }
  answer.value="";
}

function restartGame(){
  // show controls again
  document.getElementById("controls").style.display="block";
  document.getElementById("gameActions").style.display="none";

  document.getElementById("numbers").style.display="block";
  document.getElementById("keypad").style.display="grid";
  document.getElementById("answer").style.display="block";

  result.innerText="";
  timer.innerText="";
}

function resumeGame(){
  document.getElementById("gameActions").style.display="none";

  document.getElementById("numbers").style.display="block";
  document.getElementById("keypad").style.display="grid";
  document.getElementById("answer").style.display="block";

  // restart with previous settings (no asking again)
  generateNumbers();
  timeLeft=parseInt(timeSelect.value);
  gameActive=true;
  result.innerText="";
  clearInterval(timerInterval);
  timerInterval=setInterval(updateTimer,1000);
}
</script>
</body>
</html>
